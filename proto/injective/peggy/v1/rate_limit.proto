syntax = "proto3";
package injective.peggy.v1;

option go_package = "github.com/InjectiveLabs/injective-core/injective-chain/modules/peggy/types";

import "gogoproto/gogo.proto";
import "injective/oracle/v1beta1/oracle.proto";

message RateLimit {
  // address of the ERC20 token
  string token_address = 1;

  // decimals of the ERC20 token
  uint32 token_decimals = 2;

  // unique ID used to obtain the notional USD value of the ERC20 token from
  // oracle
  string token_price_id = 3;

  // length of the sliding window in which inbound (outbound) traffic is
  // measured
  uint64 rate_limit_window = 4;

  // the notional USD limit imposed on all outgoing traffic (per token)
  string rate_limit_usd = 5 [
    (gogoproto.customtype) = "cosmossdk.io/math.LegacyDec",
    (gogoproto.nullable) = false
  ];

  // [DEPRECATED] the absolute amount of tokens that can be minted on Injective
  string absolute_mint_limit = 6 [
    (gogoproto.customtype) = "cosmossdk.io/math.Int",
    (gogoproto.nullable) = false,
    deprecated = true
  ];

  // transfers that occurred within the sliding window
  repeated BridgeTransfer transfers = 7 [ deprecated = true ];

  // oracle type used to obtain the USD price of the ERC20 token (in relation
  // with token_price_id)
  injective.oracle.v1beta1.OracleType token_oracle_type = 8;
}

message BridgeTransfer {
  option deprecated = true;

  // quantity that was bridged (chain format)
  string amount = 1 [
    (gogoproto.customtype) = "cosmossdk.io/math.Int",
    (gogoproto.nullable) = false
  ];

  // the Injective block at which this amount was bridged
  uint64 block_number = 2;

  // type of transfer (withdrawal/deposit)
  bool is_deposit = 3;
}

message RateLimitTransfers {
  // contract address of the erc20 on Ethereum
  string token = 1;

  // records of deposit transfers across blocks
  repeated BlockTransferRecord inflows = 2;

  // records of withdrawal transfers across blocks
  repeated BlockTransferRecord outflows = 3;
}

message BlockTransferRecord {
  // block number at which the transfers occurred
  uint64 block_number = 1;

  // sum amount of transfers that happened in that block
  string amount = 2 [
    (gogoproto.customtype) = "cosmossdk.io/math.Int",
    (gogoproto.nullable) = false
  ];
}

message MintAmount {
  // address of the erc20 bridged in
  string token = 1;

  // amount currently minted on chain
  string amount = 2 [
    (gogoproto.customtype) = "cosmossdk.io/math.Int",
    (gogoproto.nullable) = false
  ];
}
